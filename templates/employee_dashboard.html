<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:Segoe UI;
padding-bottom:80px;
}

.action-card{
border-radius:18px;
transition:.3s;
cursor:pointer;
}

.action-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.bottom-nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
background:#111;
border-radius:25px;
padding:10px 0;
box-shadow:0 10px 30px rgba(0,0,0,.25);
z-index:999;
}

.bottom-nav a{
flex:1;
text-align:center;
color:#aaa;
font-size:13px;
text-decoration:none;
}

.bottom-nav i{
display:block;
font-size:20px;
margin-bottom:2px;
}

.bottom-nav a.active{
color:#8f7cff;
}

.nav-wrapper{
display:flex;
justify-content:space-around;
}
</style>

</head>

<body>

<div class="container mt-4">

<h4 class="mb-3">Employee Operations</h4>

<div class="row g-3">

<div class="col-6">
<a href="/bank/create-account/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
Create Account
</div>
</a>
</div>

<div class="col-6">
<a href="/bank/deposit/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
Deposit Money
</div>
</a>
</div>

<div class="col-6">
<div class="card action-card shadow p-3 text-center">
FD Approval
</div>
</div>

<div class="col-6">
<div class="card action-card shadow p-3 text-center">
Overdraft
</div>
</div>

</div>

</div>


<!-- Bottom Navbar -->
<div class="bottom-nav">
<div class="nav-wrapper">

<a href="/employee/dashboard/" class="active">
<i class="bi bi-house"></i>
Home
</a>

<a href="/bank/create-account/">
<i class="bi bi-person-plus"></i>
Create
</a>

<a href="/bank/deposit/">
<i class="bi bi-cash-coin"></i>
Deposit
</a>

<a href="#">
<i class="bi bi-graph-up"></i>
Analytics
</a>

<a href="/logout/">
<i class="bi bi-box-arrow-right"></i>
Logout
</a>

</div>
</div>

</body>
</html>
