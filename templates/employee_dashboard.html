<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:Segoe UI;
}

.navbar{
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.action-card{
border-radius:15px;
transition:.3s;
cursor:pointer;
}

.action-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">🏦 Employee Panel</span>
<a href="/logout/" class="btn btn-light btn-sm">Logout</a>
</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

<div class="row g-3">

<!-- CREATE CUSTOMER ACCOUNT -->
<div class="col-md-4 col-12">
<a href="/bank/create-account/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Create Customer Account</h6>
</div>
</a>
</div>

<!-- DEPOSIT -->
<div class="col-md-4 col-12">
<a href="/bank/deposit/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Deposit Money</h6>
</div>
</a>
</div>

<!-- APPROVE FD (future feature UI) -->
<div class="col-md-4 col-12">
<div class="card action-card shadow p-3 text-center">
<h6>Approve Fixed Deposit</h6>
</div>
</div>

<!-- OVERDRAFT (future feature UI) -->
<div class="col-md-4 col-12">
<div class="card action-card shadow p-3 text-center">
<h6>Overdraft Requests</h6>
</div>
</div>

</div>

</div>

</body>
</html>
