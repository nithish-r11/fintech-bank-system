{% extends 'base_employee.html' %}

{% block content %}

<h2>👨‍💼 Employee Dashboard</h2>

<div style="display:flex;gap:20px;flex-wrap:wrap;">

    <div style="flex:1;padding:20px;background:#4CAF50;color:white;border-radius:10px;">
        <h3>Total Accounts</h3>
        <h2>{{ accounts }}</h2>
    </div>

    <div style="flex:1;padding:20px;background:#2196F3;color:white;border-radius:10px;">
        <h3>Total Balance</h3>
        <h2>₹{{ balance }}</h2>
    </div>

    <div style="flex:1;padding:20px;background:#FF9800;color:white;border-radius:10px;">
        <h3>Total Loans</h3>
        <h2>{{ loans }}</h2>
    </div>

</div>

{% endblock %}
