<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book Fixed Deposit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🔔 TOAST POPUP */
.toast-box{
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 18px;
    color: white;
    border-radius: 8px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(-20px);
    transition: 0.4s;
    font-size: 14px;
}

.toast-box.show{
    opacity: 1;
    transform: translateY(0);
}

.toast-success{ background:#28a745; }
.toast-error{ background:#dc3545; }

</style>

</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Book Fixed Deposit</span>
<a href="/customer/dashboard/" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 col-md-4 mx-auto shadow">

<form method="post">
{% csrf_token %}

<input type="number" name="amount" class="form-control mb-3" placeholder="FD Amount" required>

<input type="number" name="months" class="form-control mb-3" placeholder="Duration (Months)" required>

<button class="btn btn-primary w-100">Book FD</button>

</form>

</div>

</div>

<!-- 🔔 TOAST MESSAGE -->
{% if messages %}
<div id="toast" class="toast-box"></div>

<script>
const toast = document.getElementById("toast");

{% for message in messages %}
    toast.innerText = "{{ message }}";
    toast.classList.add("show");

    {% if message.tags == 'error' %}
        toast.classList.add("toast-error");
    {% else %}
        toast.classList.add("toast-success");
    {% endif %}

    setTimeout(()=>{
        toast.classList.remove("show");
    }, 3000);
{% endfor %}
</script>
{% endif %}

</body>
</html>
