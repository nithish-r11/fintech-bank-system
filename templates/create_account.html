{% extends "base_employee.html" %}
{% load static %}

{% block content %}

<style>
    .container {
        max-width: 500px;
        margin: 20px auto;
        background: white;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
        color: black;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    textarea {
        resize: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #45a049;
    }

    .message {
        text-align: center;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .error { color: red; }
    .success { color: green; }

    .back-btn {
        text-decoration: none;
        display: inline-block;
        margin-bottom: 15px;
        color: #555;
    }
</style>

<div class="container">

    <a href="{% url 'employee_dashboard' %}" class="back-btn">⬅ Back</a>

    <h2>Create Customer Account</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <select name="account_type" required>
            <option value="">Select Account Type</option>
            <option value="SAVINGS">Savings</option>
            <option value="CURRENT">Current</option>
        </select>

        <input type="number" name="balance" placeholder="Initial Balance" required>

        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Phone Number" required>
        <input type="text" name="aadhaar" placeholder="Aadhaar Number" required>
        <input type="text" name="pan" placeholder="PAN Number" required>

        <textarea name="address" placeholder="Address" rows="3" required></textarea>

        <input type="text" name="pincode" placeholder="Pincode" required>

        <button type="submit">Create Account</button>
    </form>

</div>

{% endblock %}
