<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create Customer Account</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Create Customer Account</span>
<a href="/employee/dashboard/" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 col-md-4 mx-auto shadow">

{% if message %}
<div class="alert alert-info">{{ message }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input type="text" name="username" class="form-control mb-3" placeholder="Customer Username" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<select name="account_type" class="form-control mb-3">
<option value="SAVINGS">Savings</option>
<option value="CURRENT">Current</option>
</select>

<input type="number" name="balance" class="form-control mb-3" placeholder="Initial Balance" required>

<button class="btn btn-success w-100">Create Account</button>

</form>

</div>

</div>

</body>
</html>
