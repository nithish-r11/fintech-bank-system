<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fund Transfer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:Segoe UI;
padding-bottom:110px;
}

.card{
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* 🔔 POPUP */
.toast-box{
position: fixed;
top: 20px;
right: 20px;
padding: 12px 18px;
color: white;
border-radius: 8px;
z-index: 9999;
opacity: 0;
transform: translateY(-20px);
transition: 0.4s;
}

.toast-box.show{
opacity: 1;
transform: translateY(0);
}

.toast-success{ background:#28a745; }
.toast-error{ background:#dc3545; }

/* ⭐ Fixed App Navbar */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
margin:auto;
width:100%;
max-width:520px;
height:78px;
background:linear-gradient(120deg,#0f0f10,#1c1c1f);
border-top-left-radius:28px;
border-top-right-radius:28px;
box-shadow:0 -10px 30px rgba(0,0,0,.35);
display:flex;
align-items:center;
justify-content:space-around;
z-index:9999;
}

.bottom-nav a{
flex:1;
text-align:center;
color:#9aa0a6;
font-size:12px;
text-decoration:none;
}

.bottom-nav i{
display:block;
font-size:22px;
margin-bottom:4px;
}

.bottom-nav a.active{
color:#7b7cff;
transform:translateY(-6px);
}
</style>
</head>

<body>

<div class="container mt-5">

<div class="card p-4">
<h5 class="mb-3">Fund Transfer</h5>

<form method="post">
{% csrf_token %}

<label class="mb-1">Receiver Account Number</label>
<input type="text" name="account_number" class="form-control mb-3" placeholder="Receiver Account Number" required>

<label class="mb-1">Amount</label>
<input type="number" name="amount" class="form-control mb-3" placeholder="Enter amount" required>

<button class="btn btn-success w-100">
Transfer Money
</button>

</form>

</div>

</div>

<!-- 🔔 POPUP MESSAGE -->
{% if messages %}
{% for message in messages %}

<div class="toast-box show 
{% if message.tags == 'error' %}toast-error{% else %}toast-success{% endif %}">
{{ message }}
</div>

{% endfor %}

<script>
setTimeout(()=>{
document.querySelectorAll(".toast-box").forEach(e=>{
e.classList.remove("show");
});
},3000);
</script>
{% endif %}

<!-- ⭐ Bottom Navbar -->
<div class="bottom-nav">

<a href="/customer/dashboard/">
<i class="bi bi-house"></i>Home
</a>

<a href="/bank/withdraw/">
<i class="bi bi-dash-circle"></i>Withdraw
</a>

<a href="/bank/transfer/" class="active">
<i class="bi bi-arrow-left-right"></i>Transfer
</a>

<a href="/bank/history/">
<i class="bi bi-clock-history"></i>History
</a>

<a href="/logout/">
<i class="bi bi-box-arrow-right"></i>Logout
</a>

</div>

</body>
</html>
