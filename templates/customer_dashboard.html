<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f4f6f9;
font-family:Segoe UI;
}

.balance-card{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
border-radius:15px;
}

.action-card{
border-radius:15px;
transition:.3s;
cursor:pointer;
}

.action-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">🏦 Fintech Bank</span>
<a href="/logout/" class="btn btn-light btn-sm">Logout</a>
</div>
</nav>

<!-- CONTENT -->
<div class="container mt-4">

<div class="row g-3">

<!-- BALANCE -->
<div class="col-12">
<div class="card balance-card p-4 shadow">
<h5>Account Balance</h5>
<h2>₹ {{ balance }}</h2>
</div>
</div>

<!-- WITHDRAW -->
<div class="col-6">
<a href="/bank/withdraw/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Withdraw</h6>
</div>
</a>
</div>

<!-- TRANSFER -->
<div class="col-6">
<a href="/bank/transfer/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Fund Transfer</h6>
</div>
</a>
</div>

<!-- FIXED DEPOSIT -->
<div class="col-6">
<a href="/bank/fd/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Book Fixed Deposit</h6>
</div>
</a>
</div>

<!-- LOAN -->
<div class="col-6">
<a href="/bank/loan/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Apply Loan</h6>
</div>
</a>
</div>

<!-- HISTORY -->
<div class="col-12">
<a href="/bank/history/" class="text-decoration-none text-dark">
<div class="card action-card shadow p-3 text-center">
<h6>Transaction History</h6>
</div>
</a>
</div>

</div>

</div>

</body>
</html>
