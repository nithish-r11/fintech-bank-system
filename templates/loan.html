<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apply Loan</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container-fluid">
<span class="navbar-brand">Apply Loan</span>
<a href="/customer/dashboard/" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 col-md-4 mx-auto shadow">

{% if message %}
<div class="alert alert-info">{{ message }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input type="number" name="amount" class="form-control mb-3" placeholder="Loan Amount" required>

<input type="number" name="months" class="form-control mb-3" placeholder="Duration (Months)" required>

<button class="btn btn-primary w-100">Apply Loan</button>

</form>

</div>

</div>

</body>
</html>
