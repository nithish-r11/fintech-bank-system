<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deposit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
<div class="container-fluid">
<span class="navbar-brand">Deposit Money</span>
<a href="/employee/dashboard/" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4 col-md-4 mx-auto shadow">

{% if message %}
<div class="alert alert-info">{{ message }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input type="text" name="account_number" class="form-control mb-3" placeholder="Customer Account Number" required>

<input type="number" name="amount" class="form-control mb-3" placeholder="Amount" required>

<button class="btn btn-success w-100">Deposit</button>

</form>

</div>

</div>

</body>
</html>
