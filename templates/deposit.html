{% extends "base_employee.html" %}

{% block content %}

<style>
    .container {
        max-width: 420px;
        margin: 20px auto;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0px 5px 25px rgba(0,0,0,0.15);
        color: black;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg,#7f5af0,#5f6cff);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        opacity: 0.9;
    }

    .message {
        text-align: center;
        margin-bottom: 10px;
        font-weight: bold;
    }

    .error { color: red; }
    .success { color: green; }

    .back-btn {
        text-decoration: none;
        display: inline-block;
        margin-bottom: 15px;
        color: #555;
    }
</style>

<div class="container">

    <a href="{% url 'employee_dashboard' %}" class="back-btn">⬅ Back</a>

    <h2>Deposit Money 💰</h2>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="message 
                {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="account_number" placeholder="Enter Account Number" required>

        <input type="number" name="amount" placeholder="Enter Amount" required>

        <button type="submit">Deposit Now</button>
    </form>

</div>

{% endblock %}
