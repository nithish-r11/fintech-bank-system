<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Withdraw</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 col-md-4 mx-auto shadow">
<h4 class="text-center mb-3">Withdraw Money</h4>

{% if message %}
<div class="alert alert-info">{{ message }}</div>
{% endif %}

<form method="post">
{% csrf_token %}

<input type="number" name="amount" class="form-control mb-3" placeholder="Enter Amount" required>

<button class="btn btn-primary w-100">Withdraw</button>

</form>

</div>

</div>

</body>
</html>
